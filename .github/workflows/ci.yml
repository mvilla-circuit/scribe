name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  web:
    name: Typecheck, lint, circular, dead code, format & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Circular dependency check
        run: npm run lint:circular

      - name: Dead code & unused deps (knip)
        run: npm run lint:deadcode

      - name: Format check
        run: npm run format:check

      - name: Test
        run: npm run test

      - name: Build (web)
        run: npm run build

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run end-to-end tests
        run: npm run e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  rust:
    name: Rust fmt & clippy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@v5

      # Tauri's system dependencies (webkit2gtk et al.) are required to compile
      # the `tauri` crate, which clippy needs to do.
      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            libssl-dev \
            patchelf

      # Installs the toolchain + components pinned by rust-toolchain.toml.
      - name: Install Rust toolchain
        run: rustup show

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-targets --locked -- -D warnings

  tauri-build:
    name: Tauri build (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm

      # Installs the toolchain + components pinned by src-tauri/rust-toolchain.toml.
      # macOS runners already provide Xcode/clang, so no system packages are needed.
      - name: Install Rust toolchain
        working-directory: src-tauri
        run: rustup show

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      # The frontend build runs automatically via beforeBuildCommand in
      # tauri.conf.json. --no-bundle skips installer/bundle generation.
      - name: Build Tauri app (no bundle)
        run: npm run tauri build -- --no-bundle
