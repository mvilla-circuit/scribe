name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  web:
    name: Typecheck, lint, format & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Build (web)
        run: npm run build

  rust:
    name: Rust fmt & clippy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@v4

      # Tauri's system dependencies (webkit2gtk et al.) are required to compile
      # the `tauri` crate, which clippy needs to do.
      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            libssl-dev \
            patchelf

      # Installs the toolchain + components pinned by rust-toolchain.toml.
      - name: Install Rust toolchain
        run: rustup show

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-targets --locked -- -D warnings
